<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Bot</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  background: #0e1621;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: #17212b;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  border-bottom: 1px solid #2b3a4a;
}

/* ---------- CHAT ---------- */

.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.message {
  max-width: 70%;
  padding: 10px 12px;
  border-radius: 12px;
  word-wrap: break-word;
  font-size: 14px;
  animation: appear .15s ease;
}

@keyframes appear {
  from { opacity:0; transform:translateY(6px); }
  to { opacity:1; transform:translateY(0); }
}

.incoming {
  align-self: flex-start;
  background: #1f2c38;
  border-bottom-left-radius: 4px;
}

.outgoing {
  align-self: flex-end;
  background: #2f6ea5;
  border-bottom-right-radius: 4px;
}

.time {
  font-size: 11px;
  color: #b0b0b0;
  margin-top: 4px;
  text-align: right;
}

/* ---------- INPUT AREA ---------- */

.input-area {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding: 10px 12px;
  background: #17212b;
  border-top: 1px solid #2b3a4a;
}

.input-area textarea {
  flex: 1;
  resize: none;
  overflow-y: auto;
  max-height: 120px;

  padding: 10px 14px;
  border-radius: 18px;
  border: none;
  outline: none;

  background: #1f2c38;
  color: white;
  font-size: 14px;
  line-height: 1.4;

  transition: 0.15s;
}

.input-area textarea::placeholder {
  color: #8fa3b7;
}

.input-area textarea:focus {
  background: #243544;
}

.send-btn {
  background: #2f6ea5;
  border: none;
  border-radius: 20px;
  padding: 10px 18px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  height: 40px;
}

.send-btn:hover {
  background: #3a7fc0;
}

.send-btn:active {
  transform: scale(0.96);
}

.attach-btn {
  background: transparent;
  border: none;
  color: #8fa3b7;
  font-size: 20px;
  cursor: pointer;
  padding: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}

.attach-btn:hover {
  color: #fff;
}

#fileInput {
  display: none;
}

.preview-container {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.preview-image {
  max-width: 150px;
  max-height: 150px;
  border-radius: 8px;
  object-fit: cover;
  border: 1px solid #2b3a4a;
}

.preview-remove {
  position: absolute;
  top: -8px;
  right: -8px;
  background: #f00;
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.preview-wrapper {
  position: relative;
}

/* ---------- DELETE POPUP ---------- */

.delete-popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.delete-popup.active {
  display: flex;
}

.delete-modal {
  background: #17212b;
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  max-width: 280px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.delete-modal h3 {
  margin: 0 0 20px 0;
  color: #fff;
  font-size: 18px;
}

.delete-modal p {
  color: #8fa3b7;
  margin: 0 0 20px 0;
  font-size: 14px;
}

.delete-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.delete-btn {
  padding: 12px 24px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.delete-btn-cancel {
  background: #1f2c38;
  color: #fff;
}

.delete-btn-cancel:hover {
  background: #2b3a4a;
}

.delete-btn-confirm {
  background: #e94560;
  color: #fff;
}

.delete-btn-confirm:hover {
  background: #ff5a75;
}

.message.deleted {
  opacity: 0.4;
  text-decoration: line-through;
}

.message.deleted .time,
.message.deleted img,
.message.deleted video,
.message.deleted .file-attach,
.message.deleted audio {
  display: none;
}
</style>
</head>

<body>

<div class="header">Чат с трекером</div>

<div class="chat-container" id="chat">
  {MESSAGES_LIST}
</div>

<div class="input-area">
  <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
  <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>

  <textarea
    id="msgInput"
    rows="1"
    placeholder="Написать сообщение..."
  ></textarea>

  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<div class="preview-container" id="previewContainer"></div>

<!-- Delete Popup -->
<div class="delete-popup" id="deletePopup">
  <div class="delete-modal">
    <h3>Удалить сообщение?</h3>
    <p>Сообщение будет удалено для всех участников чата</p>
    <div class="delete-buttons">
      <button class="delete-btn delete-btn-cancel" onclick="closeDeletePopup()">Отмена</button>
      <button class="delete-btn delete-btn-confirm" onclick="confirmDelete()">Удалить</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");

const userId = "{USER_ID}";
const canDeleteMessages = false;

/* ---------- SCROLL ---------- */

function scrollToBottom() {
  chat.scrollTop = chat.scrollHeight;
}

window.addEventListener("load", scrollToBottom);

/* ---------- AUTO RESIZE TEXTAREA ---------- */

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
});

/* ---------- MESSAGE RENDER ---------- */

function addMessage(text, type, unixTime=null, imageUrl=null) {

  const msg = document.createElement("div");
  msg.classList.add("message", type);

  const time = unixTime
      ? new Date(unixTime * 1000).toLocaleString()
      : new Date().toLocaleString();

  let content = '';
  
  if (imageUrl) {
    content += `<img src="${imageUrl}" style="max-width: 200px; max-height: 200px; border-radius: 8px; margin-bottom: 6px;">`;
  }
  
  if (text) {
    content += text;
  }

  msg.innerHTML = `
      ${content}
      <div class="time">${time}</div>
  `;

  chat.appendChild(msg);
  scrollToBottom();
}

/* ---------- SEND ---------- */

let selectedImageBase64 = null;

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (!file.type.startsWith('image/')) {
    alert('Пожалуйста, выберите изображение');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const maxWidth = 1280;
      const maxHeight = 1280;

      let width = img.width;
      let height = img.height;

      if (width > maxWidth) {
        height = (height * maxWidth) / width;
        width = maxWidth;
      }
      if (height > maxHeight) {
        width = (width * maxHeight) / height;
        height = maxHeight;
      }

      canvas.width = width;
      canvas.height = height;

      ctx.drawImage(img, 0, 0, width, height);

      selectedImageBase64 = canvas.toDataURL('image/jpeg', 0.4);

      const previewContainer = document.getElementById('previewContainer');
      previewContainer.innerHTML = '';

      const wrapper = document.createElement('div');
      wrapper.className = 'preview-wrapper';

      const previewImg = document.createElement('img');
      previewImg.src = selectedImageBase64;
      previewImg.className = 'preview-image';

      const removeBtn = document.createElement('button');
      removeBtn.className = 'preview-remove';
      removeBtn.innerHTML = '✕';
      removeBtn.onclick = function() {
        selectedImageBase64 = null;
        previewContainer.innerHTML = '';
        document.getElementById('fileInput').value = '';
      };

      wrapper.appendChild(previewImg);
      wrapper.appendChild(removeBtn);
      previewContainer.appendChild(wrapper);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function sendMessage() {

  const text = input.value.trim();

  if (!text && !selectedImageBase64) return;

  ws.send(JSON.stringify({
    message: text,
    image: selectedImageBase64
  }));

  input.value = "";
  input.style.height = "auto";
  selectedImageBase64 = null;
  document.getElementById('previewContainer').innerHTML = '';
  document.getElementById('fileInput').value = '';
}

/* Enter — отправка, Shift+Enter — новая строка */
input.addEventListener("keydown", (e) => {

if (e.key === "Enter") {

  // CTRL + ENTER → перенос строки
  if (e.ctrlKey) {
    e.preventDefault();

    const start = input.selectionStart;
    const end = input.selectionEnd;

    input.value =
      input.value.substring(0, start) +
      "\n" +
      input.value.substring(end);

    // ставим курсор после переноса
    input.selectionStart = input.selectionEnd = start + 1;

    // обновляем авто-высоту
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";

    return;
  }

  // SHIFT + ENTER → обычный перенос (браузер сам сделает)
  if (e.shiftKey) {
    return;
  }

  // ENTER → отправка
  e.preventDefault();
  sendMessage();
}
});

/* ---------- WEBSOCKET ---------- */

const wsProtocol =
  window.location.protocol === "https:" ? "wss://" : "ws://";

const wsUrl =
  wsProtocol + window.location.host +
  "/ws/user_to_tracker_chat/" + userId;

let ws = null;
let reconnectDelay = 1000;

function connectWS() {

  console.log("Connecting WS...");

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    console.log("WS connected");
    reconnectDelay = 1000;
  };

  ws.onmessage = (event) => {

    const data = JSON.parse(event.data);

    // heartbeat
    if (data.type === "ping") {
      ws.send(JSON.stringify({ type: "pong" }));
      return;
    }

    if (data.type === "message") {

      const messageType =
        String(data.sender_id) === String(userId)
          ? "outgoing"
          : "incoming";

      addMessage(
        data.text,
        messageType,
        data.unix_time,
        data.image || null
      );
    }
  };

  ws.onclose = () => {
    console.log("WS closed. Reconnecting...");

    setTimeout(connectWS, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 10000);
  };

  ws.onerror = (err) => {
    console.log("WS error:", err);
    ws.close();
  };
}

connectWS();

/* ---------- MESSAGE DELETE (Long Press / Right Click) ---------- */

let selectedMessageId = null;
let selectedMessageElement = null;
let longPressTimer = null;
const LONG_PRESS_DURATION = 500;

function setupMessageDelete() {
  if (!canDeleteMessages) return;
  const messages = document.querySelectorAll('.message');
  
  messages.forEach(msg => {
    if (msg.classList.contains('deleted')) return;
    
    const messageId = msg.getAttribute('data-message-id');
    if (!messageId) return;
    
    msg.addEventListener('touchstart', (e) => {
      longPressTimer = setTimeout(() => {
        showDeletePopup(messageId, msg);
      }, LONG_PRESS_DURATION);
    });
    
    msg.addEventListener('touchend', () => {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    });
    
    msg.addEventListener('touchmove', () => {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    });
    
    msg.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showDeletePopup(messageId, msg);
    });
  });
}

function showDeletePopup(messageId, msgElement) {
  selectedMessageId = messageId;
  selectedMessageElement = msgElement;
  document.getElementById('deletePopup').classList.add('active');
}

function closeDeletePopup() {
  document.getElementById('deletePopup').classList.remove('active');
  selectedMessageId = null;
  selectedMessageElement = null;
}

async function confirmDelete() {
  if (!canDeleteMessages) return;
  if (!selectedMessageId) return;
  
  try {
    const response = await fetch('/delete_tracker_message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message_id: selectedMessageId,
        user_id: userId
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      if (selectedMessageElement) {
        selectedMessageElement.classList.add('deleted');
      }
      closeDeletePopup();
    } else {
      alert('Ошибка удаления: ' + (data.error || 'Неизвестная ошибка'));
    }
  } catch (e) {
    alert('Ошибка удаления сообщения');
  }
}

window.addEventListener('load', () => {
  if (!canDeleteMessages) {
    const popup = document.getElementById('deletePopup');
    if (popup) popup.style.display = 'none';
    return;
  }

  setupMessageDelete();
  
  const observer = new MutationObserver(() => {
    setupMessageDelete();
  });
  observer.observe(document.getElementById('chat'), { childList: true });
});

document.getElementById('deletePopup').addEventListener('click', (e) => {
  if (!canDeleteMessages) return;
  if (e.target.id === 'deletePopup') {
    closeDeletePopup();
  }
});

</script>

</body>
</html>
