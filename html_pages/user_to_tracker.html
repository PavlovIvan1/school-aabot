<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Bot</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  background: #0e1621;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: #17212b;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  border-bottom: 1px solid #2b3a4a;
}

/* ---------- CHAT ---------- */

.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.message {
  max-width: 70%;
  padding: 10px 12px;
  border-radius: 12px;
  word-wrap: break-word;
  font-size: 14px;
  animation: appear .15s ease;
}

@keyframes appear {
  from { opacity:0; transform:translateY(6px); }
  to { opacity:1; transform:translateY(0); }
}

.incoming {
  align-self: flex-start;
  background: #1f2c38;
  border-bottom-left-radius: 4px;
}

.outgoing {
  align-self: flex-end;
  background: #2f6ea5;
  border-bottom-right-radius: 4px;
}

.time {
  font-size: 11px;
  color: #b0b0b0;
  margin-top: 4px;
  text-align: right;
}

/* ---------- INPUT AREA ---------- */

.input-area {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding: 10px 12px;
  background: #17212b;
  border-top: 1px solid #2b3a4a;
}

.input-area textarea {
  flex: 1;
  resize: none;
  overflow-y: auto;
  max-height: 120px;

  padding: 10px 14px;
  border-radius: 18px;
  border: none;
  outline: none;

  background: #1f2c38;
  color: white;
  font-size: 14px;
  line-height: 1.4;

  transition: 0.15s;
}

.input-area textarea::placeholder {
  color: #8fa3b7;
}

.input-area textarea:focus {
  background: #243544;
}

.send-btn {
  background: #2f6ea5;
  border: none;
  border-radius: 20px;
  padding: 10px 18px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  height: 40px;
}

.send-btn:hover {
  background: #3a7fc0;
}

.send-btn:active {
  transform: scale(0.96);
}
</style>
</head>

<body>

<div class="header">Чат с трекером</div>

<div class="chat-container" id="chat">
  {MESSAGES_LIST}
</div>

<div class="input-area">
  <textarea
    id="msgInput"
    rows="1"
    placeholder="Написать сообщение..."
  ></textarea>

  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msgInput");

const userId = "{USER_ID}";

/* ---------- SCROLL ---------- */

function scrollToBottom() {
  chat.scrollTop = chat.scrollHeight;
}

window.addEventListener("load", scrollToBottom);

/* ---------- AUTO RESIZE TEXTAREA ---------- */

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
});

/* ---------- MESSAGE RENDER ---------- */

function addMessage(text, type, unixTime=null) {

  const msg = document.createElement("div");
  msg.classList.add("message", type);

  const time = unixTime
      ? new Date(unixTime * 1000).toLocaleString()
      : new Date().toLocaleString();

  msg.innerHTML = `
      ${text}
      <div class="time">${time}</div>
  `;

  chat.appendChild(msg);
  scrollToBottom();
}

/* ---------- SEND ---------- */

function sendMessage() {

  const text = input.value.trim();
  if (!text) return;

  ws.send(JSON.stringify({
      message: text
  }));

  input.value = "";
  input.style.height = "auto";
}

/* Enter — отправка, Shift+Enter — новая строка */
input.addEventListener("keydown", (e) => {

if (e.key === "Enter") {

  // CTRL + ENTER → перенос строки
  if (e.ctrlKey) {
    e.preventDefault();

    const start = input.selectionStart;
    const end = input.selectionEnd;

    input.value =
      input.value.substring(0, start) +
      "\n" +
      input.value.substring(end);

    // ставим курсор после переноса
    input.selectionStart = input.selectionEnd = start + 1;

    // обновляем авто-высоту
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";

    return;
  }

  // SHIFT + ENTER → обычный перенос (браузер сам сделает)
  if (e.shiftKey) {
    return;
  }

  // ENTER → отправка
  e.preventDefault();
  sendMessage();
}
});

/* ---------- WEBSOCKET ---------- */

const wsProtocol =
  window.location.protocol === "https:" ? "wss://" : "ws://";

const wsUrl =
  wsProtocol + window.location.host +
  "/ws/user_to_tracker_chat/" + userId;

let ws = null;
let reconnectDelay = 1000;

function connectWS() {

  console.log("Connecting WS...");

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    console.log("WS connected");
    reconnectDelay = 1000;
  };

  ws.onmessage = (event) => {

    const data = JSON.parse(event.data);

    // heartbeat
    if (data.type === "ping") {
      ws.send(JSON.stringify({ type: "pong" }));
      return;
    }

    if (data.type === "message") {

      const messageType =
        String(data.sender_id) === String(userId)
          ? "outgoing"
          : "incoming";

      addMessage(
        data.text,
        messageType,
        data.unix_time
      );
    }
  };

  ws.onclose = () => {
    console.log("WS closed. Reconnecting...");

    setTimeout(connectWS, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 10000);
  };

  ws.onerror = (err) => {
    console.log("WS error:", err);
    ws.close();
  };
}

connectWS();

</script>

</body>
</html>
